plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'net.serenity-bdd.serenity-gradle-plugin' version '5.3.7'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    // Serenity BDD + Cucumber + Selenium
    testImplementation libs.serenity.core
    testImplementation libs.serenity.cucumber
    testImplementation libs.serenity.junit

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'com.automation.App'
}

test {
    useJUnit()
    testLogging.showStandardStreams = true
    systemProperties System.getProperties()
    systemProperty "environment", "default"
    finalizedBy aggregate
}

gradle.startParameter.continueOnFailure = true